name: Build and Deploy

on:
  push:
    branches: [ master, main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  ci-testing:
    runs-on: ubuntu-latest
    env:
      LARAVEL_BYPASS_ENV_CHECK: 1
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, gd, intl, pdo_sqlite
          coverage: none

      - name: Install Composer Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM Dependencies
        run: npm ci

      - name: Build Frontend for Tests
        run: npm run build

      - name: Run JS Linting
        run: npm run lint

      - name: Run PHP Static Analysis
        run: ./vendor/bin/phpstan analyze app --level=8 --no-progress

      - name: Run PHPUnit Tests
        run: php artisan test

      - name: Run Vitest Tests
        run: npm test
        env:
          LARAVEL_BYPASS_ENV_CHECK: 1

  create-release:
    needs: ci-testing
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  deploy:
    needs: ci-testing
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Build Backend (Production)
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend (Production)
        run: |
          npm ci
          npm run build
        env:
          VITE_APP_ENV: production
          VITE_BASE_URL: /

      - name: Deploy to Server via SSH
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-avz --delete"
          SOURCE: "./"
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: ${{ secrets.SSH_PORT }}
          TARGET: ${{ secrets.REMOTE_PATH }}
          EXCLUDE: "/.git/, /.github/, /node_modules/, /tests/, /docker/, /docker-compose.yml, /.env, /storage/*.key"

      - name: Run Post-Deploy Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.REMOTE_PATH }}
            # Гарантируем наличие папок
            mkdir -p storage/logs storage/framework/sessions storage/framework/views storage/framework/cache
            chmod -R 775 storage bootstrap/cache || true

            # Используем PHP_BINARY из секретов или по умолчанию 'php'
            PHP_BIN=${{ secrets.PHP_BINARY || 'php' }}
            $PHP_BIN artisan config:clear
            $PHP_BIN artisan migrate --force
            $PHP_BIN artisan app:heal-task-completions
            $PHP_BIN artisan config:cache
            $PHP_BIN artisan route:cache
            $PHP_BIN artisan view:cache
